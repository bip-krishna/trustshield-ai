version: '3.8'

services:
  backend:
    build: ./backend
    container_name: trustshield-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./trustshield.db
      - SECRET_KEY=trustshield-ai-production-secret-key-change-me
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@trustshield.ai}
      - ADMIN_EMAIL=admin@trustshield.ai
      - ADMIN_PASSWORD=admin123
    volumes:
      - ./backend:/app
      - backend_data:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: trustshield-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
